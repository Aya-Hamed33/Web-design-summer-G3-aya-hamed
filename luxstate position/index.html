
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>luxstate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="Css/style.css">
</head>

<body>
    <header>
        <div class="heading">
            <div class="logo">
                <h2>luxstate</h2>
            </div>
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Appartments</a></li>
                    <li><a href="#">How it Works</a></li>
                    <li><a href="#">Agents</a></li>
                    <li><a href="#">Contact Us</a></li>
                </ul>
            </nav>
            <div class="start">
                <a href="#">Join Us</a>
                <button>Get Started</button>
            </div>
        </div>
    </header>

    <section class="container">
        <!-- place image first so positioned children (content, info-bar) overlay correctly -->
        <div class="image">
            <img src="images/photo_2026-07-14_23-24-27.jpg" alt="building image">
            <div class="info-bar">
                <div class="info-item">
                    <i>📞</i> <span>(000) 123-4567</span>
                </div>
                <div class="info-item">
                    <i>📍</i> <span>Melbourne, Australia</span>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="text">
                <h1>Find Your NEW <br>Modern Apartments</h1>
            </div>
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" placeholder="Search location">
                <button>Search</button>
            </div>
        </div>

        <div class="scroll-down">
            <span>Scroll Down</span>
            <div class="arrow">↓</div>
        </div>
    </section>

</body>

</html>
